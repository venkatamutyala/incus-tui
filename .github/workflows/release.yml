name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Manual approval gate: cutting a release requires a click in the protected
  # "release" environment, so a leaked token / rogue tag push can't ship on its own.
  approve:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo "Release ${{ github.ref_name }} approved."

  goreleaser:
    needs: approve
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # keyless cosign / attestations (ambient GitHub OIDC token)
      attestations: write # SLSA build-provenance attestations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      # cosign-installer v4.1.2 ships cosign v3.x, whose sign-blob writes a single
      # Sigstore bundle (checksums.txt.bundle) — see the signs block in .goreleaser.yaml.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # SLSA build-provenance for the release archives (verify: gh attestation verify).
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*.tar.gz"

  docker:
    needs: approve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # attestations OIDC
      attestations: write # SLSA build-provenance for the image
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        id: push
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # metadata-action's version has the leading "v" stripped, matching the
          # GoReleaser binaries (1.2.3, not v1.2.3).
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # SLSA build-provenance for the multi-arch image (one attestation on the index
      # digest covers all platforms). Verify: gh attestation verify oci://… --repo …
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
