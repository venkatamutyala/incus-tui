name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Manual approval gate: cutting a release requires a click in the protected
  # "release" environment, so a leaked token / rogue tag push can't ship on its own.
  approve:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo "Release ${{ github.ref_name }} approved."

  goreleaser:
    needs: approve
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # keyless cosign / attestations (ambient GitHub OIDC token)
      attestations: write # SLSA build-provenance attestations
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      # cosign v3.10.1-installer ships cosign v2.x → clean keyless sign-blob.
      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # SLSA build-provenance for the release archives (verify: gh attestation verify).
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*.tar.gz"

  docker:
    needs: approve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # attestations OIDC
      attestations: write # SLSA build-provenance for the image
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        id: push
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # metadata-action's version has the leading "v" stripped, matching the
          # GoReleaser binaries (1.2.3, not v1.2.3).
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # SLSA build-provenance for the multi-arch image (one attestation on the index
      # digest covers all platforms). Verify: gh attestation verify oci://… --repo …
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
