version: 2

project_name: incus-tui

builds:
  - id: incus-tui
    main: ./cmd/incus-tui
    binary: incus-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats:
      - tar.gz
    # No version in the name so /releases/latest/download/<name> URLs stay stable.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

# Keyless cosign signature of checksums.txt — that one file is the SHA-256 root of
# trust for every archive, so signing it covers them all. cosign v3 writes a single
# Sigstore bundle (checksums.txt.bundle) holding the signature, the Fulcio cert, and
# the Rekor transparency-log entry — verifiable without any maintainer key
# (cosign v3+ on the verifying side).
signs:
  - cmd: cosign
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
